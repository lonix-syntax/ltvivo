<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTVIVO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="ltvivo_logo.png">
  <link rel="icon" href="ltvivo_logo.png">

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'sv', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root { --bg: #050505; --surface: #121212; --primary: #e50914; --text: #ffffff; --accent: #282828; --radius: 12px; }
        
        /* Dölj Google Translate skräp */
        .goog-te-banner-frame, .goog-te-gadget-icon, .goog-tooltip, #google_translate_element { display: none !important; }
        body { top: 0px !important; position: static !important; margin: 0; background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }

        /* HEADER */
        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            top: 0; width: 100%; 
            box-sizing: border-box; 
            z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: background 0.3s;
        }
        header.scrolled { background: var(--bg); }
        .logo-img { height: 32px; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        /* MODERN LANGUAGE SELECT */
        .lang-wrapper { position: relative; }
        .lang-select {
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            appearance: none;
            cursor: pointer;
        }

        /* OVERLAYS & MODALS */
        .overlay { 
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 9000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        .overlay.active { display: flex; }
        
        .modal { 
            background: #181818; 
            padding: 40px; 
            border-radius: var(--radius); 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 50px rgba(0,0,0,1);
            position: relative;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* INPUTS & BUTTONS */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #8c8c8c; font-size: 14px; }
        .input-field { 
            width: 100%; padding: 15px; 
            border-radius: 5px; border: none; 
            background: #333; color: white; 
            font-size: 16px; box-sizing: border-box; 
        }
        .input-field:focus { background: #454545; outline: none; }

        .btn { 
            width: 100%; padding: 15px; 
            border-radius: 5px; border: none; 
            font-weight: bold; font-size: 16px; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #f6121d; }
        .btn-secondary { background: transparent; color: #8c8c8c; margin-top: 15px; }

        /* PROFILE SCREEN */
        .profile-container { text-align: center; max-width: 800px; }
        .profile-list { 
            display: flex; gap: 30px; 
            justify-content: center; flex-wrap: wrap; 
            margin-top: 30px; 
        }
        .profile-box { width: 120px; cursor: pointer; transition: transform 0.2s; }
        .profile-box:hover { transform: scale(1.1); }
        .profile-img { 
            width: 120px; height: 120px; 
            border-radius: 4px; background: #222; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 3px solid transparent;
        }
        .profile-box:hover .profile-img { border-color: #fff; }
        .profile-name { margin-top: 10px; color: #808080; font-size: 16px; }
        .profile-box:hover .profile-name { color: #fff; }

        /* CONTENT */
        .main-content { padding-top: 100px; padding-bottom: 50px; }
        .section-title { padding: 0 5%; margin: 25px 0 10px; font-size: 1.4vw; color: #e5e5e5; }
        .row { display: flex; overflow-x: auto; gap: 10px; padding: 10px 5%; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        
        .item { 
            min-width: 250px; aspect-ratio: 16/9; 
            background: var(--surface); border-radius: 4px; 
            position: relative; cursor: pointer; 
            transition: 0.3s; 
        }
        .item:hover { transform: scale(1.1); z-index: 10; }
        .item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        
        .progress-container { 
            position: absolute; bottom: 0; 
            left: 0; width: 100%; 
            height: 4px; background: rgba(255,255,255,0.3); 
        }
        .progress-bar { height: 100%; background: var(--primary); }

        /* PLAYER */
        #player { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; }
        #player.active { display: flex; }
        video { width: 100%; height: 100%; }
        .back-btn { 
            position: absolute; top: 30px; left: 30px; 
            z-index: 10001; background: none; border: none; 
            color: white; cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="google_translate_element"></div>

<div id="auth-overlay" class="overlay active">
    <div class="modal">
        <img src="ltvivo_logo.png" class="logo-img" style="margin-bottom: 30px;">
        <h1 id="auth-text" style="text-align:left; margin-bottom:20px;">Logga in</h1>
        <div class="input-group">
            <input type="text" id="email-field" class="input-field" placeholder="Användarnamn">
        </div>
        <div class="input-group">
            <input type="password" id="pass-field" class="input-field" placeholder="Lösenord">
        </div>
        <div id="auth-error" style="color: #ffa00a; font-size: 13px; margin-bottom: 15px;"></div>
        <button class="btn btn-primary" onclick="handleAuth()">Logga in</button>
        <button class="btn btn-secondary" onclick="toggleAuth()">Är du ny på LTVIVO? Registrera dig nu.</button>
    </div>
</div>

<div id="profile-overlay" class="overlay">
    <div class="profile-container">
        <h1 style="font-size: 3.5vw; font-weight: 500;">Vem tittar?</h1>
        <div class="profile-list" id="profile-list"></div>
        <button class="btn btn-secondary" style="margin-top: 50px; border: 1px solid #8c8c8c; width: auto; padding: 8px 25px;" onclick="logout()">LOGGA UT</button>
    </div>
</div>

<div id="create-profile-overlay" class="overlay">
    <div class="modal">
        <h2 style="margin-top:0;">Lägg till profil</h2>
        <div class="input-group">
            <label>Namn</label>
            <input type="text" id="new-name" class="input-field" placeholder="Ange namn">
        </div>
        <div class="input-group">
            <label>Födelsedatum</label>
            <input type="date" id="new-dob" class="input-field">
        </div>
        <button class="btn btn-primary" onclick="confirmCreateProfile()">Spara</button>
        <button class="btn btn-secondary" onclick="closeOverlay('create-profile-overlay')">Avbryt</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header id="main-header">
        <img src="ltvivo_logo.png" class="logo-img" onclick="location.reload()">
        <div class="nav-right">
            <div class="lang-wrapper">
                <select class="lang-select" id="lang-picker" onchange="changeLanguage(this.value)">
                    <option value="sv">Svenska</option><option value="en">English</option>
                    <option value="no">Norsk</option><option value="da">Dansk</option>
                    <option value="fi">Suomi</option><option value="is">Íslenska</option>
                    <option value="de">Deutsch</option><option value="fr">Français</option>
                    <option value="es">Español</option><option value="it">Italiano</option>
                    <option value="pt">Português</option><option value="nl">Nederlands</option>
                    <option value="pl">Polski</option><option value="tr">Türkçe</option>
                    <option value="ru">Русский</option><option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option><option value="zh-CN">简体中文</option>
                    <option value="ja">日本語</option><option value="ko">한국어</option>
                    </select>
            </div>
            <div id="active-profile-icon" style="cursor:pointer;" onclick="showProfiles()">
                <div style="width:32px; height:32px; background: #e50914; border-radius:4px;"></div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div id="continue-watching" style="display:none;">
            <h2 class="section-title">Fortsätt titta</h2>
            <div class="row" id="continue-row"></div>
        </div>

        <h2 class="section-title">Populärt på LTVIVO</h2>
        <div class="row" id="trending-row"></div>
    </div>
</div>

<div id="player">
    <button class="back-btn" onclick="closePlayer()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <video id="video-el" controls></video>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkaMCIY14LHr9md32OiEKY2Uhuktj3CVM",
        authDomain: "lonix-ltvivo.firebaseapp.com",
        projectId: "lonix-ltvivo",
        storageBucket: "lonix-ltvivo.firebasestorage.app",
        appId: "1:638534414733:web:0cf824edbc5980380acdc4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLoginMode = true;
    let localUserData = null;
    let currentProfile = null;
    let activeVideo = null;

    // --- MOCK CONTENT ---
    const movies = [
        {id:'m1', title:'Action X', thumb:'https://picsum.photos/seed/action/400/225', url:'https://www.w3schools.com/html/mov_bbb.mp4'},
        {id:'m2', title:'Drama Y', thumb:'https://picsum.photos/seed/drama/400/225', url:'https://www.w3schools.com/html/mov_bbb.mp4'}
    ];

    // --- LANGUAGE ---
    window.changeLanguage = (val) => {
        const combo = document.querySelector(".goog-te-combo");
        if(combo) { combo.value = val; combo.dispatchEvent(new Event('change')); }
    };

    // --- AUTH LOGIC ---
    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-text').innerText = isLoginMode ? "Logga in" : "Registrera dig";
    };

    window.handleAuth = async () => {
        const user = document.getElementById('email-field').value.trim();
        const pass = document.getElementById('pass-field').value;
        const email = `${user.toLowerCase()}@ltvivo.com`;
        try {
            if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
            else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { username: user, profiles: {} });
            }
        } catch(e) { document.getElementById('auth-error').innerText = "Felaktiga uppgifter."; }
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-overlay').classList.remove('active');
            const snap = await getDoc(doc(db, "users", user.uid));
            localUserData = snap.data();
            showProfiles();
        } else {
            document.getElementById('auth-overlay').classList.add('active');
        }
    });

    window.logout = () => signOut(auth);

    // --- PROFILES ---
    window.showProfiles = () => {
        document.getElementById('app').style.display = 'none';
        document.getElementById('profile-overlay').classList.add('active');
        const list = document.getElementById('profile-list');
        list.innerHTML = "";

        Object.keys(localUserData.profiles || {}).forEach(name => {
            const div = document.createElement('div');
            div.className = "profile-box";
            div.innerHTML = `<div class="profile-img"><svg width="60" height="60" viewBox="0 0 24 24" fill="#555"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><div class="profile-name">${name}</div>`;
            div.onclick = () => selectProfile(name);
            list.appendChild(div);
        });

        const addBtn = document.createElement('div');
        addBtn.className = "profile-box";
        addBtn.innerHTML = `<div class="profile-img" style="background:none; border:2px dashed #444;"><svg width="40" height="40" viewBox="0 0 24 24" fill="#444"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div><div class="profile-name">Lägg till</div>`;
        addBtn.onclick = () => document.getElementById('create-profile-overlay').classList.add('active');
        list.appendChild(addBtn);
    };

    window.confirmCreateProfile = async () => {
        const name = document.getElementById('new-name').value;
        const dob = document.getElementById('new-dob').value;
        if(!name || !dob) return;
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            [`profiles.${name}`]: { dob, progress: {} }
        });
        location.reload();
    };

    window.selectProfile = (name) => {
        currentProfile = name;
        document.getElementById('profile-overlay').classList.remove('active');
        document.getElementById('app').style.display = 'block';
        renderApp();
    };

    window.closeOverlay = (id) => document.getElementById(id).classList.remove('active');

    // --- CONTENT & PROGRESS ---
    function renderApp() {
        const trend = document.getElementById('trending-row');
        const cont = document.getElementById('continue-row');
        trend.innerHTML = ""; cont.innerHTML = "";
        
        const progData = localUserData.profiles[currentProfile].progress || {};
        let hasProg = false;

        movies.forEach(m => {
            const p = progData[m.id];
            const perc = p ? (p.at / p.dur) * 100 : 0;

            const card = `<div class="item" onclick="playMovie('${m.id}')"><img src="${m.thumb}">${perc > 0 && perc < 95 ? `<div class="progress-container"><div class="progress-bar" style="width:${perc}%"></div></div>`: ''}</div>`;
            
            trend.innerHTML += card;
            if(perc > 0 && perc < 95) {
                cont.innerHTML += card;
                hasProg = true;
            }
        });
        document.getElementById('continue-watching').style.display = hasProg ? 'block' : 'none';
    }

    const video = document.getElementById('video-el');
    window.playMovie = (id) => {
        activeVideo = movies.find(m => m.id === id);
        const p = localUserData.profiles[currentProfile].progress[id];
        video.src = activeVideo.url;
        video.currentTime = p ? p.at : 0;
        document.getElementById('player').classList.add('active');
        video.play();
    };

    window.closePlayer = async () => {
        video.pause();
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            [`profiles.${currentProfile}.progress.${activeVideo.id}`]: { at: video.currentTime, dur: video.duration }
        });
        document.getElementById('player').classList.remove('active');
        location.reload();
    };

    // Header scroll effekt
    window.onscroll = () => {
        const h = document.getElementById('main-header');
        if(window.scrollY > 50) h.classList.add('scrolled');
        else h.classList.remove('scrolled');
    };
</script>
</body>
</html>
