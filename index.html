<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTVIVO</title>

<style>
:root {
  --bg: #0f1014;
  --surface: #1a1c23;
  --primary: #e50914;
  --text: #ffffff;
  --text-muted: #a0a0a0;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* HEADER & SÖK */
header {
  padding: 30px 40px 10px;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--primary);
}

.search-container {
  padding: 0 40px 20px;
}

.search {
  width: 100%;
  max-width: 400px;
  padding: 14px 24px;
  border-radius: 30px;
  border: 1px solid #333;
  background: var(--surface);
  color: white;
  outline: none;
  transition: 0.3s;
  font-size: 16px;
}

.search:focus {
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
}

h2 {
  padding: 0 40px;
  margin-top: 30px;
  font-size: 22px;
  font-weight: 600;
  color: #e5e5e5;
}

/* GRID & KORT */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 10px 40px 40px;
}

.card {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  background: var(--surface);
  aspect-ratio: 16/9;
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 30px rgba(0,0,0,0.6);
  z-index: 2;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.3s;
}

.card:hover img {
  opacity: 0.5;
}

/* TITEL PÅ KORTET */
.card-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 40px 15px 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  pointer-events: none;
}

.card-title {
  font-weight: 600;
  font-size: 18px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

/* Ikoner & Progress */
.play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  opacity: 0;
  transition: 0.3s;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
}

.card:hover .play-icon {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.progress-bg {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: rgba(255,255,255,0.2);
}

.progress {
  height: 100%;
  background: var(--primary);
}

/* DETALJ-MODAL (ÖVERLAGRING) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 15, 0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
  padding: 20px;
}

.overlay.active {
  display: flex;
}

.modal-content {
  background: var(--surface);
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  border-radius: 16px;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}

.modal-hero {
  height: 350px;
  background-size: cover;
  background-position: center;
  position: relative;
}

.modal-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--surface), transparent);
}

.modal-body {
  padding: 0 40px 40px;
  position: relative;
  z-index: 1;
  margin-top: -60px; /* Drar upp texten över hero-bilden */
}

.modal-title {
  font-size: 48px;
  margin: 0 0 15px 0;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.modal-desc {
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 30px;
  font-size: 16px;
  max-width: 600px;
}

/* KNAPPAR */
.btn-group {
  display: flex;
  gap: 15px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: 0.2s;
}

.btn-primary { background: white; color: black; }
.btn-primary:hover { background: #e5e5e5; }

.btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-secondary:hover { background: rgba(255,255,255,0.2); }

/* AVSNITTSLISTA */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.episode-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid transparent;
}

.episode-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.1);
}

.ep-title { font-weight: 600; font-size: 16px; }

/* STÄNG-KNAPPAR */
.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
  transition: 0.2s;
}

.close-btn:hover { background: white; }
.close-btn:hover svg { fill: black; }
.close-btn svg { fill: white; transition: 0.2s; }

/* SPELARE */
.player {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 200;
}

.player.active { display: flex; }

.player-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px 40px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  opacity: 0; /* Visas när man rör musen (kan läggas till i JS) */
  transition: 0.3s;
}

.player:hover .player-header { opacity: 1; }
.player-title { font-size: 20px; font-weight: 600; }
video { width: 100%; height: 100%; outline: none; }

</style>
</head>

<body>

<header>LTVIVO</header>
<div class="search-container">
  <input class="search" placeholder="Sök efter filmer och serier..." oninput="search()">
</div>

<div id="continue-section" style="display:none;">
  <h2>Fortsätt titta</h2>
  <div class="grid" id="continue"></div>
</div>

<h2>Filmer och serier</h2>
<div class="grid" id="content"></div>

<div class="overlay" id="overlay">
  <div class="modal-content">
    <div class="close-btn" onclick="closeOverlay()">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
    <div class="modal-hero" id="modal-hero"></div>
    
    <div class="modal-body">
      <h1 class="modal-title" id="title"></h1>
      <p class="modal-desc" id="desc"></p>
      
      <div class="btn-group" id="btn-group">
        </div>

      <div id="episodes-container" style="display: none;">
        <h3>Avsnitt</h3>
        <div id="episodes" class="episodes-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="player" id="player">
  <div class="player-header">
    <div class="player-title" id="player-title">Laddar...</div>
    <div class="close-btn" style="position:relative; top:0; right:0;" onclick="closePlayer()">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
  </div>
  <video id="video" controls></video>
</div>

<script>
// ===== DATA =====
const movies = [
  { id:"m1", name:"Film 1", description:"En episk film om något riktigt spännande. Mycket action och drama utlovas.", thumbnail:"https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=800&q=80" },
  { id:"m2", name:"Film 2", description:"En spännande thriller som håller dig på helspänn.", thumbnail:"https://images.unsplash.com/photo-1440404653325-ab127d49abc1?auto=format&fit=crop&w=800&q=80" }
];

const series = [
  { id:"s1", name:"Serie 1", description:"Följ med på ett episkt äventyr genom flera säsonger.", thumbnail:"https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?auto=format&fit=crop&w=800&q=80" }
];

// NY STRUKTUR PÅ VIDEOS: type = 'movie', 'episode' eller 'trailer'. number avgör trailer/avsnitts-nummer.
const videos = [
  { contentId:"m1", type:"movie", file:"videos/m1.mp4" },
  { contentId:"m1", type:"trailer", number:1, file:"videos/m1_trailer1.mp4" },
  { contentId:"m2", type:"movie", file:"videos/m2.mp4" },
  
  { contentId:"s1", type:"trailer", number:1, file:"videos/s1_trailer1.mp4" },
  { contentId:"s1", type:"trailer", number:2, file:"videos/s1_trailer2.mp4" },
  { contentId:"s1", type:"episode", number:1, title:"Pilot", file:"videos/s1e1.mp4" },
  { contentId:"s1", type:"episode", number:2, title:"Uppvaknandet", file:"videos/s1e2.mp4" }
];

// ===== RENDER KORT =====
function render(list, targetId = "content") {
  const el = document.getElementById(targetId);
  el.innerHTML = "";

  list.forEach(item => {
    const progress = localStorage.getItem(item.id+"_time");
    const duration = localStorage.getItem(item.id+"_duration");
    const percent = (progress && duration) ? (progress/duration)*100 : 0;

    const div = document.createElement("div");
    div.className = "card";

    // Skapar kortets HTML med snygg titel och play-ikon (SVG)
    div.innerHTML = `
      <img src="${item.thumbnail}" alt="${item.name}">
      
      <svg class="play-icon" width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="32" fill="rgba(0,0,0,0.6)"/>
        <polygon fill="white" points="26,18 46,32 26,46"/>
      </svg>
      
      <div class="card-info">
        <div class="card-title">${item.name}</div>
      </div>
      
      ${percent > 0 ? `
      <div class="progress-bg">
        <div class="progress" style="width:${percent}%"></div>
      </div>` : ""}
    `;

    div.onclick = () => openDetail(item);
    el.appendChild(div);
  });
}

// ===== SÖK =====
function search() {
  const v = document.querySelector(".search").value.toLowerCase();
  const all = [...movies, ...series];
  render(all.filter(x => x.name.toLowerCase().includes(v)));
}

// ===== DETALJ-MODAL =====
function openDetail(item) {
  document.getElementById("overlay").classList.add("active");
  document.getElementById("title").innerText = item.name;
  document.getElementById("desc").innerText = item.description;
  document.getElementById("modal-hero").style.backgroundImage = `url('${item.thumbnail}')`;

  const btnGroup = document.getElementById("btn-group");
  const epContainer = document.getElementById("episodes-container");
  const epDiv = document.getElementById("episodes");
  
  btnGroup.innerHTML = "";
  epDiv.innerHTML = "";

  // Sortera ut data för detta ID
  const itemVideos = videos.filter(v => v.contentId === item.id);
  const trailers = itemVideos.filter(v => v.type === "trailer").sort((a,b) => a.number - b.number);
  const episodes = itemVideos.filter(v => v.type === "episode").sort((a,b) => a.number - b.number);
  const movie = itemVideos.find(v => v.type === "movie");

  // Skapa Huvud "Play" knapp (Film eller första/senaste avsnittet)
  const mainPlayBtn = document.createElement("button");
  mainPlayBtn.className = "btn btn-primary";
  mainPlayBtn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24"><polygon fill="black" points="8,5 19,12 8,19"/></svg> Spela`;
  
  if (movie) {
    mainPlayBtn.onclick = () => play(item, movie);
    btnGroup.appendChild(mainPlayBtn);
  } else if (episodes.length > 0) {
    // Om serie, spela sista tittade, eller avsnitt 1
    const lastEpNum = localStorage.getItem(item.id+"_lastEpisode") || 1;
    const epToPlay = episodes.find(e => e.number == lastEpNum) || episodes[0];
    mainPlayBtn.onclick = () => play(item, epToPlay);
    btnGroup.appendChild(mainPlayBtn);
  }

  // Skapa Trailer-knappar
  trailers.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "btn btn-secondary";
    btn.innerText = `Trailer ${t.number}`;
    btn.onclick = () => play(item, t);
    btnGroup.appendChild(btn);
  });

  // Skapa Avsnitts-lista (bara för serier)
  if (episodes.length > 0) {
    epContainer.style.display = "block";
    episodes.forEach(ep => {
      const div = document.createElement("div");
      div.className = "episode-item";
      div.innerHTML = `
        <span class="ep-title">${ep.number}. ${ep.title || "Avsnitt "+ep.number}</span>
        <svg width="24" height="24" viewBox="0 0 24 24"><polygon fill="white" points="8,5 19,12 8,19"/></svg>
      `;
      div.onclick = () => play(item, ep);
      epDiv.appendChild(div);
    });
  } else {
    epContainer.style.display = "none";
  }
}

function closeOverlay() {
  document.getElementById("overlay").classList.remove("active");
}

// ===== SPELARE =====
function play(item, videoObj) {
  const video = document.getElementById("video");
  const player = document.getElementById("player");
  const playerTitle = document.getElementById("player-title");

  // Sätt rätt titel i spelaren
  if(videoObj.type === "trailer") {
    playerTitle.innerText = `${item.name} - Trailer ${videoObj.number}`;
  } else if(videoObj.type === "episode") {
    playerTitle.innerText = `${item.name} - S1:E${videoObj.number} ${videoObj.title ? " - "+videoObj.title : ""}`;
  } else {
    playerTitle.innerText = item.name;
  }

  video.src = videoObj.file;

  // Ladda sparad tid endast om det är en film eller ett avsnitt (inte trailers)
  if(videoObj.type !== "trailer") {
    const saved = localStorage.getItem(item.id+"_time");
    if(saved) video.currentTime = saved;
  }

  video.onloadedmetadata = () => {
    if(videoObj.type !== "trailer") {
      localStorage.setItem(item.id+"_duration", video.duration);
    }
  };

  video.ontimeupdate = () => {
    if(videoObj.type !== "trailer") {
      localStorage.setItem(item.id+"_time", video.currentTime);
      if(videoObj.type === "episode") {
        localStorage.setItem(item.id+"_lastEpisode", videoObj.number);
      }
    }
  };

  video.onended = () => {
    if(videoObj.type === "episode") {
      autoNext(item, videoObj);
    } else {
      closePlayer();
      loadContinue(); // Uppdatera startsidan
    }
  };

  player.classList.add("active");
  video.play();
}

function closePlayer() {
  const video = document.getElementById("video");
  video.pause();
  document.getElementById("player").classList.remove("active");
  loadContinue(); // Ladda om ifall vi har kommit längre i filmen
}

// ===== AUTONEXT =====
function autoNext(item, currentVideoObj) {
  const nextEp = videos.find(v => v.contentId === item.id && v.type === "episode" && v.number === currentVideoObj.number + 1);
  if(nextEp) {
    play(item, nextEp);
  } else {
    closePlayer();
  }
}

// ===== FORTSÄTT TITTA =====
function loadContinue() {
  const all = [...movies, ...series];
  const inProgress = all.filter(item => localStorage.getItem(item.id+"_time"));
  
  if(inProgress.length > 0) {
    document.getElementById("continue-section").style.display = "block";
    render(inProgress, "continue");
  } else {
    document.getElementById("continue-section").style.display = "none";
  }
}

// INIT (Jag har lagt in bilder från Unsplash som placeholders)
render([...movies, ...series]);
loadContinue();
</script>

</body>
</html>
