<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTVIVO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="ltvivo_logo.png">

    <style>
        :root { --bg: #0a0a0b; --surface: #16171d; --primary: #e50914; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* Layout */
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(10,10,11,0.8); backdrop-filter: blur(10px); }
        .logo { font-size: 28px; font-weight: 900; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px 40px; }
        
        /* Komponenter */
        .card { border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; background: var(--surface); aspect-ratio: 16/9; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; padding: 10px; background: linear-gradient(transparent, black); width: 100%; font-size: 14px; }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .overlay.active { display: flex; }
        .modal { background: var(--surface); padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; }
        
        /* Forms */
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }

        /* Profiler */
        .profile-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .profile-card { cursor: pointer; width: 120px; }
        .profile-img { width: 100px; height: 100px; background: #333; border-radius: 10px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid transparent; }
        .profile-card:hover .profile-img { border-color: white; }

        /* Player */
        #player { position: fixed; inset: 0; background: black; z-index: 2000; display: none; }
        #player.active { display: flex; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="auth-screen" class="overlay active">
    <div class="modal">
        <h2 id="auth-title">Logga in</h2>
        <input type="text" id="username" class="input-field" placeholder="Användarnamn">
        <input type="password" id="password" class="input-field" placeholder="Lösenord">
        <p id="auth-error" style="color:red; font-size:12px;"></p>
        <button class="btn btn-primary" onclick="handleAuth()">Logga in</button>
        <p onclick="toggleAuth()" style="cursor:pointer; font-size:13px; color:gray; margin-top:15px;">Inget konto? Skapa ett här.</p>
    </div>
</div>

<div id="profile-screen" class="overlay">
    <h1>Vem tittar?</h1>
    <div class="profile-list" id="profiles"></div>
    <button class="btn btn-outline" style="margin-top:40px;" onclick="logout()">Logga ut</button>
</div>

<div id="app" style="display:none;">
    <header>
        <div class="logo">LTVIVO</div>
        <button class="btn btn-outline" id="installBtn" style="display:none;" onclick="showInstall()">Installera</button>
    </header>
    <div class="grid" id="content-grid"></div>
</div>

<div id="player">
    <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; color:white; background:none; border:none; font-size:20px; cursor:pointer; z-index:10;">✕</button>
    <video id="v-element" controls></video>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDkaMCIY14LHr9md32OiEKY2Uhuktj3CVM",
  authDomain: "lonix-ltvivo.firebaseapp.com",
  projectId: "lonix-ltvivo",
  storageBucket: "lonix-ltvivo.firebasestorage.app",
  messagingSenderId: "638534414733",
  appId: "1:638534414733:web:0cf824edbc5980380acdc4"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;
    let currentUserData = null;

    // --- SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

    // --- AUTH LOGIK ---
    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Logga in" : "Skapa konto";
    };

    window.handleAuth = async () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const email = `${user.toLowerCase()}@ltvivo.com`;

        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { username: user, profiles: [] });
            }
        } catch(e) { document.getElementById('auth-error').innerText = "Något gick fel. Kolla uppgifterna."; }
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-screen').classList.remove('active');
            const snap = await getDoc(doc(db, "users", user.uid));
            currentUserData = snap.data();
            renderProfiles();
        } else {
            document.getElementById('auth-screen').classList.add('active');
            document.getElementById('app').style.display = 'none';
        }
    });

    window.logout = () => signOut(auth);

    // --- PROFILER ---
    function renderProfiles() {
        document.getElementById('profile-screen').classList.add('active');
        const container = document.getElementById('profiles');
        container.innerHTML = "";

        currentUserData.profiles.forEach(p => {
            const d = document.createElement('div');
            d.className = "profile-card";
            d.innerHTML = `<div class="profile-img">👤</div><p>${p.name}</p>`;
            d.onclick = () => selectProfile(p);
            container.appendChild(d);
        });

        const add = document.createElement('div');
        add.className = "profile-card";
        add.innerHTML = `<div class="profile-img" style="border:2px dashed #444;">+</div><p>Lägg till</p>`;
        add.onclick = addNewProfile;
        container.appendChild(add);
    }

    async function addNewProfile() {
        const name = prompt("Namn på profil:");
        const bday = prompt("Födelsedatum (ÅÅÅÅ-MM-DD):");
        if(!name || !bday) return;
        
        const newP = { name, birthDate: bday };
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            profiles: arrayUnion(newP)
        });
        location.reload();
    }

    function selectProfile(p) {
        const age = new Date().getFullYear() - new Date(p.birthDate).getFullYear();
        document.getElementById('profile-screen').classList.remove('active');
        document.getElementById('app').style.display = 'block';
        renderContent(age);
    }

    // --- CONTENT ---
    function renderContent(age) {
        const grid = document.getElementById('content-grid');
        grid.innerHTML = "";
        // Här mappar du din contentData array (filtrera på age)
    }

    window.closePlayer = () => {
        document.getElementById('v-element').pause();
        document.getElementById('player').classList.remove('active');
    };
</script>
</body>
</html>
