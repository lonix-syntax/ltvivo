<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTVIVO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'sv', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root { --bg: #0a0a0b; --surface: #16171d; --primary: #e50914; --text: #ffffff; --accent: #2d2f3a; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon, .goog-te-gadget-simple img, .goog-tooltip { display: none !important; }
        body { top: 0px !important; position: static !important; margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        #google_translate_element { display: none !important; }

        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(10,10,11,0.9); backdrop-filter: blur(10px); }
        .logo-img { height: 35px; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        
        .lang-select { background: var(--surface); color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; cursor: pointer; max-width: 150px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .overlay.active { display: flex; }
        .modal { background: var(--surface); width: 90%; max-width: 380px; padding: 40px; border-radius: 20px; text-align: center; }
        
        .input-field { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 14px 24px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid #555; color: white; }

        .profile-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
        .profile-card { cursor: pointer; width: 110px; text-align: center; }
        .profile-img { width: 100px; height: 100px; background: #222; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; border: 3px solid transparent; }
        .profile-card:hover .profile-img { border-color: white; transform: scale(1.05); }

        .content-section { padding: 20px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; background: #111; aspect-ratio: 16/9; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .progress-bg { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .progress-fill { height: 100%; background: var(--primary); }

        #player { position: fixed; inset: 0; background: black; z-index: 10000; display: none; }
        #player.active { display: flex; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="google_translate_element"></div>

<div id="auth-screen" class="overlay active">
    <div class="modal">
        <img src="ltvivo_logo.png" style="height:40px; margin-bottom:20px;">
        <h2 id="auth-title">Logga in</h2>
        <input type="text" id="username" class="input-field" placeholder="Användarnamn">
        <input type="password" id="password" class="input-field" placeholder="Lösenord">
        <div id="auth-error" style="color:var(--primary); font-size:14px; min-height:20px;"></div>
        <button class="btn btn-primary" onclick="handleAuth()">Fortsätt</button>
        <p onclick="toggleAuthMode()" style="color:#aaa; cursor:pointer; font-size:13px; margin-top:20px;">Inget konto? Registrera här.</p>
    </div>
</div>

<div id="profile-screen" class="overlay">
    <div style="text-align:center;">
        <h1 style="font-size:36px;">Vem tittar?</h1>
        <div class="profile-list" id="profiles"></div>
        <button class="btn btn-outline" style="margin:40px auto 0;" onclick="logout()">Logga ut</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <img src="ltvivo_logo.png" class="logo-img">
        <div class="header-controls">
            <select class="lang-select" id="language-picker" onchange="changeLanguage(this.value)">
                <option value="sv">Svenska</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="nl">Nederlands</option>
                <option value="tr">Türkçe</option>
                <option value="pl">Polski</option>
                <option value="ru">Русский</option>
                <option value="ar">العربية</option>
                <option value="hi">हिन्दी</option>
                <option value="zh-CN">简体中文</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="no">Norsk</option>
                <option value="da">Dansk</option>
                <option value="fi">Suomi</option>
                <option value="el">Ελληνικά</option>
                <option value="he">עברית</option>
                <option value="th">ไทย</option>
                <option value="vi">Tiếng Việt</option>
                <option value="id">Bahasa Indonesia</option>
                </select>
            <div id="current-profile-btn" style="font-weight:bold; cursor:pointer;" onclick="location.reload()">
                <span id="current-profile-name"></span>
            </div>
        </div>
    </header>

    <div class="content-section">
        <div id="continue-section" style="display:none;">
            <h3>Fortsätt titta</h3>
            <div class="grid" id="continue-grid"></div>
        </div>
        <h3>Populärt</h3>
        <div class="grid" id="main-grid"></div>
    </div>
</div>

<div id="player">
    <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; z-index:10; background:none; border:none; color:white; font-size:30px; cursor:pointer;">✕</button>
    <video id="main-video" controls></video>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkaMCIY14LHr9md32OiEKY2Uhuktj3CVM",
        authDomain: "lonix-ltvivo.firebaseapp.com",
        projectId: "lonix-ltvivo",
        storageBucket: "lonix-ltvivo.firebasestorage.app",
        messagingSenderId: "638534414733",
        appId: "1:638534414733:web:0cf824edbc5980380acdc4"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    let isLogin = true;
    let userData = null;
    let activeProfileName = null;
    let activeVideoItem = null;

    const contentData = [
        { id: "v1", title: "Film Ett", thumb: "https://picsum.photos/seed/v1/600/337", video: "https://www.w3schools.com/html/mov_bbb.mp4", minAge: 0 },
        { id: "v2", title: "Action Film", thumb: "https://picsum.photos/seed/v2/600/337", video: "https://www.w3schools.com/html/mov_bbb.mp4", minAge: 15 }
    ];

    window.changeLanguage = (lang) => {
        const el = document.querySelector(".goog-te-combo");
        if(el) { el.value = lang; el.dispatchEvent(new Event('change')); }
    };

    window.toggleAuthMode = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Logga in" : "Skapa konto";
    };

    window.handleAuth = async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const email = `${u.toLowerCase()}@ltvivo.com`;
        try {
            if(isLogin) await signInWithEmailAndPassword(auth, email, p);
            else {
                const res = await createUserWithEmailAndPassword(auth, email, p);
                await setDoc(doc(db, "users", res.user.uid), { username: u, profiles: {} });
            }
        } catch(e) { document.getElementById('auth-error').innerText = "Fel inloggning."; }
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            document.getElementById('auth-screen').classList.remove('active');
            const snap = await getDoc(doc(db, "users", user.uid));
            userData = snap.data();
            renderProfiles();
        } else {
            document.getElementById('auth-screen').classList.add('active');
        }
    });

    window.logout = () => signOut(auth);

    function renderProfiles() {
        document.getElementById('profile-screen').classList.add('active');
        const list = document.getElementById('profiles');
        list.innerHTML = "";
        Object.keys(userData.profiles).forEach(pName => {
            const d = document.createElement('div');
            d.className = "profile-card";
            d.innerHTML = `<div class="profile-img">👤</div><p>${pName}</p>`;
            d.onclick = () => selectProfile(pName);
            list.appendChild(d);
        });
        const add = document.createElement('div');
        add.className = "profile-card";
        add.innerHTML = `<div class="profile-img" style="border:2px dashed #444;">+</div><p>Skapa</p>`;
        add.onclick = () => {
            const n = prompt("Namn:");
            const b = prompt("Födelsedatum (ÅÅÅÅ-MM-DD):");
            if(n && b) saveProfile(n, b);
        };
        list.appendChild(add);
    }

    async function saveProfile(name, bday) {
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            [`profiles.${name}`]: { birthDate: bday, progress: {} }
        });
        location.reload();
    }

    function selectProfile(name) {
        activeProfileName = name;
        document.getElementById('profile-screen').classList.remove('active');
        document.getElementById('app').style.display = 'block';
        document.getElementById('current-profile-name').innerText = name;
        renderContent();
    }

    function renderContent() {
        const grid = document.getElementById('main-grid');
        const cont = document.getElementById('continue-grid');
        grid.innerHTML = ""; cont.innerHTML = "";
        let hasCont = false;
        const progress = userData.profiles[activeProfileName].progress || {};

        contentData.forEach(item => {
            const p = progress[item.id] || { time: 0, duration: 1 };
            const perc = (p.time / p.duration) * 100;
            const html = `<img src="${item.thumb}"><h4>${item.title}</h4>${perc > 0 && perc < 95 ? `<div class="progress-bg"><div class="progress-fill" style="width:${perc}%"></div></div>` : ""}`;
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = html;
            card.onclick = () => openPlayer(item, p.time);
            grid.appendChild(card);
            if(perc > 0 && perc < 95) {
                const c2 = card.cloneNode(true);
                c2.onclick = () => openPlayer(item, p.time);
                cont.appendChild(c2);
                hasCont = true;
            }
        });
        document.getElementById('continue-section').style.display = hasCont ? 'block' : 'none';
    }

    function openPlayer(item, start) {
        activeVideoItem = item;
        const v = document.getElementById('main-video');
        v.src = item.video;
        v.currentTime = start;
        document.getElementById('player').classList.add('active');
        v.play();
    }

    window.closePlayer = async () => {
        const v = document.getElementById('main-video');
        v.pause();
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
            [`profiles.${activeProfileName}.progress.${activeVideoItem.id}`]: { time: v.currentTime, duration: v.duration }
        });
        location.reload();
    };
</script>
</body>
</html>
